spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/restdb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: restadmin
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

    # Hikari pool configuration
    hikari:
      pool-name: RestDB-Pool
      maximum-pool-size: 5
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false

  jpa:
    database: mysql
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      #Show SQL logs
      show_sql: true
      format_sql: true

      ddl-auto: validate
#      ddl-auto: update

  h2:
    console:
      enabled: false
  flyway:
    enabled: false

    # This is default but put here to show you can update it
    # https://docs.spring.io/spring-boot/how-to/data-initialization.html#howto.data-initialization.migration-tool
    locations: classpath:db/migration

